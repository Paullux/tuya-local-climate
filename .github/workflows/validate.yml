name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  # Advisory only: the "brands" check requires a listing in the separate
  # home-assistant/brands repository, which only matters for submission to
  # the default HACS store. It doesn't affect installing this repo as a
  # HACS custom repository, so this job doesn't gate the workflow.
  hacs:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
